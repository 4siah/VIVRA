<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="prueba.css">
</head>
<body>



<div class="wrapper">
  <div class="carousel-container">

    <input type="radio" name="slide" id="c1" checked>
    <label for="c1" class="card card1">
      <div class="row">
        <div class="icon">1</div>
        <div class="description">
          <h4>Winter</h4>
          <p>Winter has so much to offer - creative activities</p>
        </div>
      </div>
    </label>

    <input type="radio" name="slide" id="c2">
    <label for="c2" class="card card2">
      <div class="row">
        <div class="icon">2</div>
        <div class="description">
          <h4>Digital</h4>
          <p>Creative digital experiences</p>
        </div>
      </div>
    </label>

    <input type="radio" name="slide" id="c3">
    <label for="c3" class="card card3">
      <div class="row">
        <div class="icon">3</div>
        <div class="description">
          <h4>Nature</h4>
          <p>Explore the wild outdoors</p>
        </div>
      </div>
    </label>

    <input type="radio" name="slide" id="c4">
    <label for="c4" class="card card4">
      <div class="row">
        <div class="icon">4</div>
        <div class="description">
          <h4>Travel</h4>
          <p>Discover new places</p>
        </div>
      </div>
    </label>

    <input type="radio" name="slide" id="c5">
    <label for="c5" class="card card5">
      <div class="row">
        <div class="icon">5</div>
        <div class="description">
          <h4>Adventure</h4>
          <p>Feel the adrenaline</p>
        </div>
      </div>
    </label>

  </div>
</div>













</body>
</html>
